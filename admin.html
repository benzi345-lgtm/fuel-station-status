<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - อัพเดทสถานะน้ำมัน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    #admin-map { height: 450px; width: 100%; border-radius: 1rem; z-index: 0; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- Header -->
  <header class="bg-gradient-to-r from-gray-700 to-gray-800 text-white shadow-lg sticky top-0 z-10">
    <div class="max-w-5xl mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-xl font-bold flex items-center gap-2">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            Admin - อัพเดทสถานะน้ำมัน
          </h1>
          <p class="text-gray-300 text-sm">กดสวิตช์เพื่อเปลี่ยนสถานะน้ำมันแต่ละปั๊ม</p>
        </div>
        <a href="index.html" class="bg-white/20 hover:bg-white/30 rounded-xl px-3 py-2 text-sm transition-colors">
          ดูหน้าลูกค้า
        </a>
      </div>
    </div>
  </header>

  <!-- Location Picker -->
  <section class="max-w-5xl mx-auto px-4 pt-6">
    <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
      <div class="bg-blue-600 text-white px-5 py-3">
        <h2 class="text-lg font-bold">ตั้งตำแหน่งปั๊ม</h2>
        <p class="text-blue-200 text-sm">1. เลือกปั๊มจากเมนูด้านล่าง → 2. กดจุดบนแผนที่เพื่อวาง marker</p>
      </div>
      <div class="p-4">
        <div class="flex items-center gap-3 mb-3 flex-wrap">
          <label class="font-medium text-gray-700">เลือกปั๊ม:</label>
          <select id="station-select" class="border rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-blue-300 focus:outline-none" onchange="onStationSelect()">
          </select>
          <span id="coord-display" class="text-sm text-gray-500"></span>
        </div>
        <div id="admin-map"></div>
      </div>
    </div>
  </section>

  <!-- Quick Actions -->
  <div class="max-w-5xl mx-auto px-4 pt-6">
    <div class="flex gap-2">
      <button onclick="setAllFuel(true)"
              class="bg-green-600 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-green-700 transition-colors">
        ตั้งทุกปั๊มว่ามีน้ำมันหมด
      </button>
      <button onclick="setAllFuel(false)"
              class="bg-red-500 text-white px-4 py-2 rounded-xl text-sm font-medium hover:bg-red-600 transition-colors">
        ตั้งทุกปั๊มว่าน้ำมันหมด
      </button>
    </div>
  </div>

  <!-- Admin Station Cards -->
  <main class="max-w-5xl mx-auto px-4 py-6">
    <div id="admin-stations" class="grid grid-cols-1 md:grid-cols-2 gap-4">
    </div>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>initAdminApp();</script>
</body>
</html>
